<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renderbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #fff;
  display: grid;
  place-items: center;
  font-family: 'Geist', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── LOADER ── */

#loader {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  transition: opacity .5s ease, transform .5s ease;
}

#loader.out {
  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;
}

#loader img {
  width: 76px;
  height: 76px;
  object-fit: contain;
  display: block;
}

.progress-track {
  width: 120px;
  height: 3px;
  background: #ebebeb;
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #111;
  border-radius: 999px;
  transition: width .06s linear;
}

/* ── PANEL ── */

#panel {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: min(380px, calc(100vw - 40px));
  border: 1px solid #e8e8e8;
  border-radius: 20px;
  padding: 48px 40px 40px;
  opacity: 0;
  transform: translateY(16px);
  pointer-events: none;
  transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
}

#panel.in {
  opacity: 1;
  transform: none;
  pointer-events: auto;
}

.panel-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.panel-logo img {
  width: 34px;
  height: 34px;
  object-fit: contain;
  display: block;
}

.panel-logo span {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.45rem;
  color: #111;
  letter-spacing: -.02em;
}

.panel-sub {
  font-size: .875rem;
  font-weight: 300;
  color: #aaa;
  line-height: 1.75;
  max-width: 260px;
  margin-bottom: 28px;
}

.join-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  background: #111;
  color: #fff;
  text-decoration: none;
  border-radius: 999px;
  font-size: .78rem;
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  transition: opacity .18s, transform .18s;
}

.join-btn:hover {
  opacity: .72;
  transform: scale(.97);
}

.join-btn svg {
  width: 14px;
  height: 14px;
  fill: currentColor;
  flex-shrink: 0;
}

</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <img
    src="https://cdn.jsdelivr.net/gh/Lumen-Cheats/Renderbox-Logo@main/New%20renderbox%20logo%20(no%20BG%20no%20title).png"
    alt="Renderbox"
    onerror="this.style.display='none'"
  >
  <div class="progress-track">
    <div class="progress-fill" id="bar"></div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="panel-logo">
    <img
      src="https://cdn.jsdelivr.net/gh/Lumen-Cheats/Renderbox-Logo@main/New%20renderbox%20logo%20(no%20BG%20no%20title).png"
      alt="Renderbox"
      onerror="this.style.display='none'"
    >
    <span>Renderbox</span>
  </div>

  <p class="panel-sub">
    We're opening soon. Check our Discord daily for updates, news, and the official launch announcement.
  </p>

  <a class="join-btn" href="https://discord.gg/YOURLINK" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.031.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    Join the Discord
  </a>
</div>

<script>
  const bar    = document.getElementById('bar');
  const loader = document.getElementById('loader');
  const panel  = document.getElementById('panel');

  const DURATION = 2400;
  const TICK = 28;
  const STEPS = DURATION / TICK;
  let step = 0;

  function ease(t) {
    return t < .5 ? 2*t*t : -1+(4-2*t)*t;
  }

  const timer = setInterval(() => {
    step++;
    const t = Math.min(step / STEPS, 1);
    bar.style.width = (ease(t) * 100) + '%';

    if (t >= 1) {
      clearInterval(timer);
      setTimeout(() => {
        loader.classList.add('out');
        setTimeout(() => {
          loader.style.display = 'none';
          panel.classList.add('in');
        }, 550);
      }, 300);
    }
  }, TICK);
</script>

</body>
</html>
